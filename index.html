<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Memory Game 💚</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  text-align: center;
  background: url("bg.jpg") no-repeat center center/cover;
  height: 100vh;
  color: white;
}

h1 {
  margin-top: 30px;
  font-size: 40px;
  text-shadow: 0 0 10px #00ff99;
}

p {
  margin-top: -10px;
}

.game {
  width: 300px;
  margin: 40px auto;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

.card {
  width: 90px;
  height: 120px;
  background: #1e6b45;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  cursor: pointer;
  transition: 0.3s;
}

.card.open {
  background: white;
  color: black;
}

.win {
  font-size: 25px;
  margin-top: 20px;
}
</style>

</head>
<body>

<h1>Find Our Special Memory 💚</h1>
<p>Chances Left: <span id="chance">3</span></p>

<div class="game" id="game"></div>

<div class="win" id="winText"></div>

<script>
let emojis = ["💚","💚","💖","💖","😍","😍"];
let shuffled = emojis.sort(() => 0.5 - Math.random());

let game = document.getElementById("game");
let opened = [];
let matched = [];
let chances = 3;

document.getElementById("chance").innerText = chances;

shuffled.forEach((emoji, index) => {
  let card = document.createElement("div");
  card.classList.add("card");
  card.dataset.emoji = emoji;
  card.dataset.index = index;
  card.innerHTML = "💚";

  card.onclick = () => {
    if (opened.length < 2 && !card.classList.contains("open")) {
      card.classList.add("open");
      card.innerHTML = emoji;
      opened.push(card);

      if (opened.length === 2) {
        setTimeout(checkMatch, 800);
      }
    }
  };

  game.appendChild(card);
});

function checkMatch() {
  let [c1, c2] = opened;

  if (c1.dataset.emoji === c2.dataset.emoji) {
    matched.push(c1, c2);

    if (matched.length === shuffled.length) {
      document.getElementById("winText").innerText =
        "Awww 💖 You found all memories!";
    }
  } else {
    c1.classList.remove("open");
    c2.classList.remove("open");
    c1.innerHTML = "💚";
    c2.innerHTML = "💚";

    chances--;
    document.getElementById("chance").innerText = chances;

    if (chances === 0) {
      document.getElementById("winText").innerText =
        "Oh no 😢 Try again!";
    }
  }

  opened = [];
}
</script>

</body>
</html>
